basePath: /
definitions:
  http.authorizePaymentRequest:
    properties:
      amount:
        type: integer
      order_id:
        type: string
    required:
    - amount
    - order_id
    type: object
  http.errorResponse:
    properties:
      error:
        type: string
    type: object
  http.paymentResponse:
    properties:
      amount:
        type: integer
      id:
        type: string
      order_id:
        type: string
      status:
        type: string
      transaction_id:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: Processes payments and validates transaction limits. Amounts above
    $1000 (100000 cents) are declined.
  title: Payment Service API
  version: "1.0"
paths:
  /payments:
    post:
      consumes:
      - application/json
      description: Processes a payment for an order. Amounts > 100000 cents ($1000)
        are automatically Declined.
      parameters:
      - description: Payment payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.authorizePaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.paymentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorResponse'
      summary: Authorize a payment
      tags:
      - payments
  /payments/{order_id}:
    get:
      description: Returns the payment record associated with the given order ID.
      parameters:
      - description: Order ID
        in: path
        name: order_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.paymentResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorResponse'
      summary: Get payment by order ID
      tags:
      - payments
swagger: "2.0"
